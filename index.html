<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퇴직금 Calculator</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h2 {
    text-align: center;
}

.sub {
    text-align: center;
    color: #cbd5f5;
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    color: #94a3b8;
}

input, button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

input {
    background: #1e293b;
    color: white;
    font-size: 15px;
}

button {
    background: #22c55e;
    font-weight: bold;
    font-size: 16px;
}

.result {
    margin-top: 25px;
    font-size: 26px;
    text-align: center;
    font-weight: bold;
}

.details {
    margin-top: 15px;
    font-size: 14px;
    color: #cbd5f5;
}

.info {
    margin-top: 15px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>퇴직금 Calculator</h2>
<div class="sub">Severance Pay / සේවක විශ්‍රාම දීමනා</div>

<label>입사일 (Start Date / ආරම්භ දිනය)</label>
<input type="date" id="start">

<label>퇴사일 (End Date / අවසන් දිනය)</label>
<input type="date" id="end">

<label>최근 3개월 급여 (Last 3 Months Salary / අවසන් මාස 3 වැටුප)</label>
<input type="number" id="s1" placeholder="Month 1">
<input type="number" id="s2" placeholder="Month 2">
<input type="number" id="s3" placeholder="Month 3">

<button onclick="calc()">Calculate</button>

<div class="result" id="result">퇴직금: ₩0</div>

<div class="details" id="details"></div>

<div class="info">
✔ 1년 이상 근무 시 지급 (Only if worked 1+ year)<br>
✔ 예상 금액입니다 (Estimate only)<br>
✔ 마지막 3개월 급여 기준 계산<br>
✔ සේවය වසර 1කට වැඩි නම් පමණි
</div>

<div class="info">
© 2026 KR Udara 🇱🇰 | Korea Worker Support Tool<br>
නිර්මාණය: KR Udara
</div>

</div>

<script>
function formatDate(date) {
    let y = date.getFullYear();
    let m = String(date.getMonth() + 1).padStart(2, '0');
    let d = String(date.getDate()).padStart(2, '0');
    return y + "-" + m + "-" + d;
}

function parseDate(input) {
    if (!input) return null;

    if (input.includes("-")) {
        let p = input.split("-");
        return new Date(p[0], p[1]-1, p[2]);
    }

    if (input.includes("/")) {
        let p = input.split("/");
        return new Date(p[2], p[1]-1, p[0]);
    }

    return null;
}

function calc(){

    let startInput = document.getElementById("start").value;
    let endInput = document.getElementById("end").value;

    let s1 = Number(document.getElementById("s1").value);
    let s2 = Number(document.getElementById("s2").value);
    let s3 = Number(document.getElementById("s3").value);

    if (!startInput || !endInput || s1<=0 || s2<=0 || s3<=0) {
        alert("Please fill all fields correctly");
        return;
    }

    let start = parseDate(startInput);
    let end = parseDate(endInput);

    if (!start || !end) {
        alert("Invalid date");
        return;
    }

    start.setHours(0,0,0,0);
    end.setHours(0,0,0,0);

    let totalDays = Math.floor((end - start) / (1000*60*60*24));

    if (totalDays < 365) {
        document.getElementById("result").innerText = "퇴직금: ₩0";
        document.getElementById("details").innerHTML =
        "❌ 1년 미만 근무 (Less than 1 year)<br>❌ වසර 1කට අඩු සේවය";
        return;
    }

    let past = new Date(end);
    past.setMonth(past.getMonth()-3);
    past.setHours(0,0,0,0);

    let threeMonthDays = Math.floor((end - past)/(1000*60*60*24));

    let totalSalary = s1 + s2 + s3;
    let avgDaily = totalSalary / threeMonthDays;

    let years = totalDays / 365;
    let severance = avgDaily * 30 * years;

    document.getElementById("result").innerText =
        "퇴직금: ₩" + Math.round(severance).toLocaleString();

    document.getElementById("details").innerHTML =
        "📅 Start: " + formatDate(start) + "<br>" +
        "📅 End: " + formatDate(end) + "<br><br>" +
        "총 근무일수: " + totalDays + "일<br>" +
        "근속 연수: " + years.toFixed(2) + "년<br>" +
        "평균 일급: ₩" + Math.round(avgDaily).toLocaleString();
}
</script>

</body>
</html>
